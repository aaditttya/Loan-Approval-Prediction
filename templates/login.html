{% extends "base.html" %}

{% block title %}
Admin Login | LoanWise AI
{% endblock %}

{% block content %}

<section class="login-container">

    <div class="login-card">

        <div class="login-header">

            <div class="login-icon">
                <i class="fa-solid fa-user-shield"></i>
            </div>

            <h1>Admin Portal</h1>

            <p>
                Sign in to access the LoanWise AI Dashboard.
            </p>

        </div>

        {% if error_message %}

            <div class="server-error-card">

                <i class="fa-solid fa-circle-exclamation"></i>

                <div>
                    <span>Login Failed</span>
                    <p>{{ error_message }}</p>
                </div>

            </div>

        {% endif %}

        <form method="POST" class="login-form">

            <div class="form-group">

                <label for="username">
                    <i class="fa-solid fa-user"></i>
                    Username
                </label>

                <input
                    type="text"
                    id="username"
                    name="username"
                    placeholder="Enter username"
                    autocomplete="username"
                    required
                >

            </div>

            <div class="form-group">

                <label for="password">
                    <i class="fa-solid fa-lock"></i>
                    Password
                </label>

                <div class="password-wrapper">

                    <input
                        type="password"
                        id="password"
                        name="password"
                        placeholder="Enter password"
                        autocomplete="current-password"
                        required
                    >

                    <button
                        type="button"
                        id="togglePassword"
                        class="password-toggle"
                        aria-label="Show password"
                    >
                        <i class="fa-solid fa-eye"></i>
                    </button>

                </div>

            </div>

            <button
                type="submit"
                class="predict-button"
            >
                <i class="fa-solid fa-right-to-bracket"></i>

                <span class="button-text">
                    Login to Dashboard
                </span>
            </button>

        </form>

    </div>

</section>

{% endblock %}

{% block extra_js %}

<script>
    document.addEventListener("DOMContentLoaded", function () {
        const passwordInput = document.getElementById("password");
        const togglePassword = document.getElementById("togglePassword");

        if (!passwordInput || !togglePassword) {
            return;
        }

        togglePassword.addEventListener("click", function () {
            const isPasswordHidden =
                passwordInput.getAttribute("type") === "password";

            passwordInput.setAttribute(
                "type",
                isPasswordHidden ? "text" : "password"
            );

            const icon = togglePassword.querySelector("i");

            if (icon) {
                icon.classList.toggle("fa-eye", !isPasswordHidden);
                icon.classList.toggle("fa-eye-slash", isPasswordHidden);
            }

            togglePassword.setAttribute(
                "aria-label",
                isPasswordHidden ? "Hide password" : "Show password"
            );
        });
    });
</script>

{% endblock %}
