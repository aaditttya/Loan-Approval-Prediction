<!DOCTYPE html>
<html>
<head>
    <title>Loan Approval Prediction</title>

    <style>

        body{
            font-family: Arial;
            background:#f4f4f4;
            text-align:center;
        }

        .container{
            width:450px;
            background:white;
            margin:30px auto;
            padding:20px;
            border-radius:10px;
            box-shadow:0 0 10px gray;
        }

        input,select{
            width:95%;
            padding:10px;
            margin:8px;
        }

        button{
            width:100%;
            padding:12px;
            background:green;
            color:white;
            border:none;
            cursor:pointer;
            font-size:16px;
        }

        h2{
            color:#333;
        }

    </style>

</head>

<body>

<div class="container">

<h2>Loan Approval Prediction</h2>

<form action="/predict" method="post">

<select name="Gender">
<option value="1">Male</option>
<option value="0">Female</option>
</select>

<select name="Married">
<option value="1">Yes</option>
<option value="0">No</option>
</select>

<input type="number" name="Dependents" placeholder="Dependents" required>

<select name="Education">
<option value="0">Graduate</option>
<option value="1">Not Graduate</option>
</select>

<select name="Self_Employed">
<option value="1">Yes</option>
<option value="0">No</option>
</select>

<input type="number" name="ApplicantIncome" placeholder="Applicant Income" required>

<input type="number" name="CoapplicantIncome" placeholder="Coapplicant Income" required>

<input type="number" name="LoanAmount" placeholder="Loan Amount" required>

<input type="number" name="Loan_Amount_Term" placeholder="Loan Amount Term" required>

<select name="Credit_History">
<option value="1">Good Credit History</option>
<option value="0">Bad Credit History</option>
</select>

<select name="Property_Area">
<option value="0">Rural</option>
<option value="1">Semiurban</option>
<option value="2">Urban</option>
</select>

<button type="submit">Predict Loan Status</button>

</form>

{% if prediction %}

<h2>{{ prediction }}</h2>

{% endif %}

</div>

</body>
</html>
